<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRC Research Dashboard</title>
<meta http-equiv="refresh" content="0; url=./dashboard/index.html">
<link rel="canonical" href="./dashboard/index.html">
<style>
  :root {
    color-scheme: dark;
    --bg: #080810;
    --surface: #111118;
    --border: #252530;
    --text: #e8e8f0;
    --text-soft: #a8a9be;
    --accent: #7c6af7;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(124, 106, 247, 0.18) 0%, rgba(124, 106, 247, 0) 32%),
      var(--bg);
    color: var(--text);
    font-family: Inter, system-ui, -apple-system, sans-serif;
  }

  main {
    width: min(100%, 560px);
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--surface);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
  }

  h1 {
    margin: 0 0 10px;
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1;
  }

  p {
    margin: 0;
    color: var(--text-soft);
    line-height: 1.6;
  }

  a {
    color: var(--accent);
  }
</style>
</head>
<body>
<main>
  <h1>Opening the DRC Research Dashboard</h1>
  <p>If you are not redirected automatically, <a href="./dashboard/index.html">open the dashboard here</a>.</p>
</main>
</body>
</html>
